<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de Stock 3D · DYG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f10;
      --panel: #131819;
      --panel-2: #1a2123;
      --ink: #eef4f4;
      --muted: #7fa3a3;
      --line: #263032;
      --brand: #2ee8d4;
      --brand-2: #15c9b6;
      --brand-dim: rgba(46,232,212,.12);
      --danger: #ff5e57;
      --warn: #f5b731;
      --ok: #5be89a;
      --radius: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,.45);
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      color: var(--ink);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 40% at 50% -10%, rgba(46,232,212,.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 90%, rgba(46,232,212,.04) 0%, transparent 60%);
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; }

    button {
      border: 0;
      border-radius: var(--radius);
      background: var(--brand);
      color: #041c1a;
      min-height: 42px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: -.01em;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    button:hover { background: #7df2e8; box-shadow: 0 0 0 3px rgba(46,232,212,.2); }
    button:active { transform: scale(.97); }
    button.secondary {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    button.secondary:hover { background: #222c2e; box-shadow: 0 0 0 2px rgba(46,232,212,.15); }
    button.danger { background: var(--danger); color: #230201; }
    button.danger:hover { background: #ff8a84; }
    button:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    button.slim { min-height: 34px; padding: 0 11px; font-size: 13px; }

    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0,0,0,.35);
      color: var(--ink);
      padding: 9px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(46,232,212,.15);
    }
    select option { background: #131819; }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ─── LOGIN ─── */
    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      animation: fadeIn .5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      width: min(420px, 100%);
      background: linear-gradient(145deg, rgba(23,30,32,.98), rgba(16,22,24,.98));
      border: 1px solid var(--line);
      border-top-color: rgba(46,232,212,.25);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(46,232,212,.04) inset;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), #9afffa);
      color: #041c1a;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(46,232,212,.3);
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .logo span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
    }

    .login .form { display: grid; gap: 12px; }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(46,232,212,.05);
      border: 1px solid rgba(46,232,212,.1);
      border-radius: var(--radius);
    }
    .hint b { color: var(--brand); }

    /* ─── APP SHELL ─── */
    .app {
      display: none;
      width: min(1420px, 100%);
      margin: 0 auto;
      padding: 16px 18px 28px;
      animation: fadeIn .35s ease;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 3.5vw, 34px);
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(90deg, var(--ink) 50%, var(--brand) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .userbox {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .user-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 6px var(--ok);
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sync-ok    { background: var(--ok);   box-shadow: 0 0 6px var(--ok); }
    .sync-saving{ background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: pulse .8s infinite; }
    .sync-error { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .sync-offline{ background: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── NAV ─── */
    .nav {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .nav button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      min-height: 38px;
      padding: 0 16px;
      font-size: 14px;
    }
    .nav button:hover { background: var(--panel-2); color: var(--ink); box-shadow: none; }
    .nav button.active {
      background: var(--brand-dim);
      color: var(--brand);
      border-color: rgba(46,232,212,.3);
      box-shadow: none;
    }

    /* ─── SCREENS ─── */
    .screen { display: none; animation: slideUp .25s ease; }
    .screen.active { display: block; }

    /* ─── PANEL ─── */
    .panel {
      background: linear-gradient(160deg, rgba(22,29,31,.97), rgba(16,21,23,.97));
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-head {
      display: grid;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.02);
    }

    .panel-head h2, .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(200px, 1fr) 170px 130px;
      gap: 9px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0,0,0,.35);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s;
    }
    .toggle:hover { border-color: rgba(46,232,212,.25); }
    .toggle input { width: 16px; min-height: 16px; accent-color: var(--brand); cursor: pointer; }

    /* ─── PRODUCTS GRID ─── */
    .products {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
      max-height: calc(100vh - 270px);
      overflow: auto;
    }

    .product-card {
      display: grid;
      grid-template-rows: auto 1fr auto auto auto;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0,0,0,.2);
      transition: border-color .2s, transform .15s, box-shadow .2s;
      cursor: default;
    }
    .product-card:hover {
      border-color: rgba(46,232,212,.3);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 1 / .75;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a3c3e, #0f2527);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--brand);
      font-weight: 900;
      font-size: 16px;
      text-align: center;
      border: 1px solid var(--line);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }

    .title strong { display: block; font-size: 14px; line-height: 1.25; font-weight: 700; }
    .title span { display: block; color: var(--muted); margin-top: 4px; font-size: 12px; }

    .price-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .price-cell {
      padding: 8px;
      background: rgba(0,0,0,.2);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .price-cell .price-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .price-cell strong { display: block; font-size: 14px; font-weight: 800; margin-top: 3px; }

    .stock-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 32px;
      border-radius: 8px;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--line);
      font-weight: 800;
      font-size: 13px;
    }
    .stock-pill::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ok);
    }
    .stock-low { color: var(--warn); }
    .stock-low .stock-pill::before, .stock-pill.stock-low::before { background: var(--warn); }
    .stock-zero { color: var(--danger); }
    .stock-zero .stock-pill::before, .stock-pill.stock-zero::before { background: var(--danger); box-shadow: none; }

    /* ─── STATS ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: linear-gradient(140deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .stat::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--brand), transparent);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .stat strong {
      display: block;
      margin-top: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--brand);
    }

    /* ─── REPORT ─── */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .list {
      display: grid;
      gap: 7px;
      padding: 12px;
      max-height: 420px;
      overflow: auto;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(0,0,0,.15);
      transition: border-color .15s;
    }
    .item:hover { border-color: rgba(46,232,212,.2); }
    .item strong { display: block; font-size: 13px; font-weight: 700; }
    .item span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .item > strong { color: var(--brand); font-size: 14px; white-space: nowrap; }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 14px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: rgba(0,0,0,.1);
      font-size: 13px;
    }

    /* ─── CONFIG ─── */
    .config-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .box { padding: 16px; }
    .form { display: grid; gap: 11px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    .config-list {
      display: grid;
      gap: 7px;
      padding: 12px;
      max-height: calc(100vh - 260px);
      overflow: auto;
    }

    .config-row {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr) 90px 90px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(0,0,0,.15);
      transition: border-color .15s;
    }
    .config-row:hover { border-color: rgba(46,232,212,.2); }
    .config-row strong { font-size: 12px; font-weight: 800; color: var(--brand); }
    .config-row span { font-size: 12px; color: var(--muted); }

    /* ─── SALE CART ─── */
    .sale-cart {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px;
      background: rgba(0,0,0,.2);
    }

    .sale-cart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    .sale-cart-head strong { color: var(--brand); font-size: 14px; text-transform: none; letter-spacing: 0; }

    .sale-cart-list {
      display: grid;
      gap: 6px;
      max-height: 160px;
      overflow: auto;
    }

    .cart-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 9px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 7px;
    }
    .cart-row strong { font-size: 13px; display: block; }
    .cart-row span { color: var(--muted); font-size: 12px; display: block; margin-top: 2px; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 4px;
      background: rgba(0,0,0,.3);
    }
    .segmented button { background: transparent; color: var(--muted); min-height: 34px; box-shadow: none; }
    .segmented button:hover { background: var(--panel-2); color: var(--ink); box-shadow: none; }
    .segmented button.active { background: var(--brand); color: #041c1a; box-shadow: none; }

    /* ─── DIALOG ─── */
    dialog {
      width: min(700px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-top-color: rgba(46,232,212,.3);
      border-radius: 14px;
      padding: 0;
      color: var(--ink);
      background: linear-gradient(160deg, #151d1f, #0f1517);
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    dialog::backdrop { background: rgba(0,0,0,.65); backdrop-filter: blur(4px); }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(8px);
      background: linear-gradient(135deg, #e9ffff, #c2fff9);
      color: #031a19;
      border-radius: 10px;
      padding: 10px 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .25s ease;
      z-index: 100;
      font-weight: 800;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1050px) {
      .config-layout, .report-grid { grid-template-columns: 1fr; }
      .products, .config-list { max-height: none; }
    }
    @media (max-width: 980px) {
      .products { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .app { padding: 12px 14px 24px; }
      .topbar { grid-template-columns: 1fr; gap: 10px; }
      .userbox { justify-content: flex-start; }
      .stats { grid-template-columns: 1fr 1fr; }
      .search-row, .two { grid-template-columns: 1fr; }
      .config-row { grid-template-columns: 1fr; }
      .nav button { font-size: 13px; padding: 0 12px; }
    }
    @media (max-width: 560px) {
      .products { grid-template-columns: 1fr; }
      .thumb { aspect-ratio: 1 / .65; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stat strong { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <section class="login" id="loginScreen">
    <div class="login-card">
      <div class="logo">
        <div class="logo-mark">3D</div>
        <div>
          <h1>Control de Stock</h1>
          <span>DYG · Ventas y stock compartido</span>
        </div>
      </div>
      <div class="form">
        <label>Usuario<input id="loginUser" autocomplete="username" required></label>
        <label>Contraseña<input id="loginPass" type="password" autocomplete="current-password" required></label>
        <button id="loginBtn" type="button">Entrar</button>
      </div>

    </div>
  </section>

  <!-- APP -->
  <main class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <h1>Control de Stock 3D</h1>
        <p id="subtitle">Venta rápida</p>
      </div>
      <div class="userbox">
        <div class="user-badge">
          <span class="user-dot"></span>
          <span id="currentUserLabel">—</span>
        </div>
        <div class="user-badge" title="Estado de sincronización">
          <span class="sync-dot sync-ok" id="syncStatus"></span>
          <span style="font-size:11px">Nube</span>
        </div>
        <button class="secondary slim" id="logoutBtn">Salir</button>
      </div>
    </header>

    <nav class="nav">
      <button class="active" data-screen="sell">🛍 Vender</button>
      <button class="secondary" data-screen="reports">📊 Reportes</button>
      <button class="secondary" data-screen="settings">⚙️ Configuración</button>
    </nav>

    <!-- VENDER -->
    <section class="screen active" id="screen-sell">
      <section class="panel">
        <div class="panel-head">
          <h2>Catálogo para vender</h2>
          <div class="search-row">
            <label>Buscar<input id="searchInput" type="search" placeholder="Pikachu, jarra, rosa..."></label>
            <label>Categoría<select id="categoryFilter"></select></label>
            <label class="toggle"><input id="availableOnly" type="checkbox" checked> Con stock</label>
          </div>
        </div>
        <div class="products" id="productList"></div>
      </section>
    </section>

    <!-- REPORTES -->
    <section class="screen" id="screen-reports">
      <div class="stats">
        <div class="stat"><span>Productos</span><strong id="statProducts">0</strong></div>
        <div class="stat"><span>Stock total</span><strong id="statStock">0</strong></div>
        <div class="stat"><span>Ventas del mes</span><strong id="statMonth">$0</strong></div>
        <div class="stat"><span>Unidades vendidas</span><strong id="statUnits">0</strong></div>
      </div>
      <div class="report-grid">
        <section class="panel">
          <div class="panel-head"><h2>Ventas del mes</h2></div>
          <div class="list" id="saleList"></div>
        </section>
        <section class="panel">
          <div class="panel-head"><h2>Movimientos</h2></div>
          <div class="list" id="auditList"></div>
        </section>
      </div>
    </section>

    <!-- CONFIG -->
    <section class="screen" id="screen-settings">
      <div class="config-layout">
        <section class="panel box">

            <input id="editId" type="hidden">
            <div class="two">

          </div>
          <div class="config-list" id="configList"></div>
        </section>
      </div>

    let inventory = [];

    let audit = [];

    const el = id => document.getElementById(id);

    };

    // ─── UTILS ───
    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
    }
    function normalize(t) {
      return String(t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    }
    function activeUserName() { return currentUser?.name || "Sin usuario"; }
    function showToast(msg, duration) {
      els.toast.textContent = msg;
      els.toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove("show"), duration || 2800);
    }
    function setSyncStatus(state) {
      if (!els.syncStatus) return;
      els.syncStatus.className = "sync-dot sync-" + state;
      els.syncStatus.title = {ok:"Sincronizado",saving:"Guardando...",error:"Error de conexión",offline:"Sin conexión"}[state] || "";
    }

    // ─── FIREBASE: GUARDAR ───
    async function saveInventoryItem(item) {
      setSyncStatus("saving");
      try {
        await db.collection("inventory").doc(item.id).set(item);
        setSyncStatus("ok");
      } catch(e) { setSyncStatus("error"); console.error(e); }
    }

    async function saveSale(sale) {
      try {
        await db.collection("sales").doc(sale.id).set(sale);
      } catch(e) { console.error(e); }
    }

    async function saveAuditEntry(entry) {
      try {
        await db.collection("audit").doc(entry.id).set(entry);
      } catch(e) { console.error(e); }
    }

    async function saveManyInventoryItems(items) {
      setSyncStatus("saving");
      try {
        // Firestore batch: máx 500 por lote
        for (let i = 0; i < items.length; i += 400) {
          const batch = db.batch();
          items.slice(i, i + 400).forEach(item =>
            batch.set(db.collection("inventory").doc(item.id), item)
          );
          await batch.commit();
        }
        setSyncStatus("ok");
      } catch(e) { setSyncStatus("error"); console.error(e); }
    }

    // ─── FIREBASE: LISTENERS TIEMPO REAL ───
    function startListeners() {
      db.collection("inventory").onSnapshot(snap => {
        inventory = snap.docs.map(d => ({ image: "", ...d.data() }));
        renderAll();
      }, () => setSyncStatus("offline"));

      db.collection("sales").onSnapshot(snap => {
        sales = snap.docs.map(d => d.data());
        renderStats();
        renderSales();
      });

      db.collection("audit").onSnapshot(snap => {
        audit = snap.docs.map(d => d.data()).sort((a,b) => a.date < b.date ? -1 : 1);
        renderAudit();
      });
    }

    // ─── PRIMER USO: cargar inventario inicial si Firestore está vacío ───
    async function initFirestore() {
      showToast("Conectando con la nube...", 99999);
      setSyncStatus("saving");
      try {
        const snap = await db.collection("inventory").limit(1).get();
        if (snap.empty) {
          showToast("Primera vez: cargando productos...", 99999);
          await saveManyInventoryItems(INITIAL_INVENTORY);
        }
        els.toast.classList.remove("show");
        setSyncStatus("ok");
        startListeners();
      } catch(e) {
        setSyncStatus("error");
        showToast("Error al conectar. Verificá tu internet.");
        console.error(e);
      }
    }

    function addAudit(action, detail) {
      const entry = { id: `${Date.now()}-${Math.random()}`, date: new Date().toISOString(), user: activeUserName(), action, detail };
      saveAuditEntry(entry);
    }

    // ─── SESIÓN ───
    function showSession() {
      if (!currentUser) {
        els.loginScreen.style.display = "grid";
        els.app.style.display = "none";
      } else {
        els.loginScreen.style.display = "none";
        els.app.style.display = "block";
        els.currentUserLabel.textContent = currentUser.name;
        initFirestore();
      }
    }

    els.loginBtn.addEventListener("click", () => {
      const found = users.find(u => u.user === els.loginUser.value.trim().toLowerCase() && u.pass === els.loginPass.value);

    els.loginUser.addEventListener("keydown", e => { if (e.key === "Enter") els.loginPass.focus(); });

    el("logoutBtn").addEventListener("click", () => {
      addAudit("Salida", "Cierre de sesión");
      currentUser = null;
      localStorage.removeItem(sessionKey);
      showSession();
    });

    // ─── NAVEGACIÓN ───
    function switchScreen(name) {
      document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.id === `screen-${name}`));
      document.querySelectorAll(".nav button").forEach(b => {
        b.classList.toggle("active", b.dataset.screen === name);
        b.classList.toggle("secondary", b.dataset.screen !== name);
      });
      els.subtitle.textContent = name === "sell" ? "Venta rápida" : name === "reports" ? "Reportes y movimientos" : "Configuración";
    }
    document.querySelectorAll(".nav button").forEach(b => b.addEventListener("click", () => switchScreen(b.dataset.screen)));

    // ─── FILTROS ───
    function getFiltered(configMode) {
      const q = normalize(configMode ? els.configSearch.value : els.searchInput.value);
      const cat = els.categoryFilter.value;
      return inventory.filter(item => {
        const hay = normalize([item.id, item.product, item.category, item.design, item.color].join(" "));
        return (!q || hay.includes(q)) &&
               (configMode || !cat || item.category === cat) &&
               (configMode || !els.availableOnly.checked || Number(item.stock) > 0);
      });
    }

    // ─── RENDER ───
    function renderAll() {
      renderCategories(); renderSaleProducts(); renderProducts();
      renderConfigList(); renderStats(); renderSales(); renderAudit(); renderCart();
    }

    function renderCategories() {
      const cur = els.categoryFilter.value;
      const cats = [...new Set(inventory.map(i => i.category).filter(Boolean))].sort();
      els.categoryFilter.innerHTML = `<option value="">Todas</option>` + cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
      els.categoryFilter.value = cats.includes(cur) ? cur : "";
    }

    function renderSaleProducts() {
      const cur = els.saleProduct.value;
      const avail = inventory.filter(i => Number(i.stock) > 0);
      els.saleProduct.innerHTML = avail.map(i => `<option value="${esc(i.id)}">${esc(i.id)} - ${esc(i.product)} - ${esc(i.design)} (${i.stock})</option>`).join("");
      if (avail.some(i => i.id === cur)) els.saleProduct.value = cur;
      updateSalePrice();
    }

    function renderProducts() {
      const prods = getFiltered(false);
      if (!prods.length) { els.productList.innerHTML = `<div class="empty">No hay productos para esa búsqueda.</div>`; return; }
      els.productList.innerHTML = prods.map(item => {
        const sc = item.stock <= 0 ? "stock-zero" : item.stock <= lowStockLimit ? "stock-low" : "";
        const img = item.image
          ? `<img src="${esc(item.image)}" alt="${esc(item.product)}" onerror="this.style.display='none'">`
          : `<span>${esc(item.id)}</span>`;
        return `<article class="product-card" data-id="${esc(item.id)}">
          <div class="thumb">${img}</div>
          <div class="title"><strong>${esc(item.product)}</strong><span>${esc(item.category)} · ${esc(item.design)} · ${esc(item.color||"Sin color")}</span></div>
          <div class="price-grid">
            <div class="price-cell"><div class="price-label">Mayorista</div><strong>${money.format(item.wholesale||0)}</strong></div>
            <div class="price-cell"><div class="price-label">Minorista</div><strong>${money.format(item.retail||0)}</strong></div>
          </div>
          <div class="stock-pill ${sc}">Stock: ${item.stock}</div>
          <button class="slim" data-sell type="button" ${Number(item.stock)<=0?"disabled":""}>Vender</button>
        </article>`;
      }).join("");
    }

    function renderConfigList() {
      const prods = getFiltered(true);
      if (!prods.length) { els.configList.innerHTML = `<div class="empty">No hay productos para editar.</div>`; return; }
      els.configList.innerHTML = prods.map(item => `
        <div class="config-row" data-id="${esc(item.id)}">
          <strong>${esc(item.id)}</strong>
          <span>${esc(item.product)} · ${esc(item.design)}</span>
          <span>Stock: ${item.stock}</span>
          <button class="secondary slim" data-edit type="button">Editar</button>
        </div>`).join("");
    }

    function getMonthSales() {
      const n = new Date();
      return sales.filter(s => { const d = new Date(s.date); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth(); });
    }

    function renderSales() {
      const ms = getMonthSales();
      if (!ms.length) { els.saleList.innerHTML = `<div class="empty">Sin ventas este mes.</div>`; return; }
      els.saleList.innerHTML = [...ms].sort((a,b)=>b.date>a.date?1:-1).map(s => `
        <div class="item">
          <div><strong>${esc(s.product)} · ${esc(s.design)}</strong>
          <span>${s.qty} u. · ${s.kind==="wholesale"?"Mayorista":"Minorista"} · ${esc(s.seller||"—")} · ${new Date(s.date).toLocaleString("es-AR")}</span></div>
          <strong>${money.format(s.total)}</strong>
        </div>`).join("");
    }

    function renderAudit() {
      if (!audit.length) { els.auditList.innerHTML = `<div class="empty">Sin movimientos.</div>`; return; }
      els.auditList.innerHTML = [...audit].reverse().map(a => `
        <div class="item"><div>
          <strong>${esc(a.action)}</strong>
          <span>${esc(a.detail)} · ${esc(a.user)} · ${new Date(a.date).toLocaleString("es-AR")}</span>
        </div></div>`).join("");
    }

    function renderStats() {
      const ms = getMonthSales();
      els.statProducts.textContent = inventory.length;
      els.statStock.textContent = inventory.reduce((s,i)=>s+Number(i.stock||0),0);
      els.statMonth.textContent = money.format(ms.reduce((s,i)=>s+Number(i.total||0),0));
      els.statUnits.textContent = ms.reduce((s,i)=>s+Number(i.qty||0),0);
    }

    // ─── VENTAS ───
    function updateSalePrice() {
      const prod = inventory.find(i => i.id === els.saleProduct.value);
      els.salePrice.value = prod ? (selectedPriceKind==="wholesale" ? prod.wholesale : prod.retail) : "";
    }

    function addCurrentItemToCart() {
      const prod = inventory.find(i => i.id === els.saleProduct.value);
      const qty = Math.max(1, Number(els.saleQty.value||1));
      const price = Math.max(0, Number(els.salePrice.value||0));
      const avail = Number(prod?.stock||0);
      const inCart = saleCart.filter(i=>i.productId===prod?.id).reduce((s,i)=>s+i.qty,0);
      if (!prod) return showToast("Elegí un producto.");
      if (avail<=0) return showToast("Sin stock.");
      if (qty+inCart>avail) return showToast(`Stock insuficiente. Quedan ${avail}.`);
      saleCart.push({ productId:prod.id, product:prod.product, design:prod.design, qty, price, total:qty*price, kind:selectedPriceKind });
      els.saleQty.value = 1;
      renderCart();
      showToast("Producto agregado.");
    }

    function renderCart() {
      const units = saleCart.reduce((s,i)=>s+i.qty,0);
      const total = saleCart.reduce((s,i)=>s+i.total,0);
      els.cartSummary.textContent = `${units} unidades · ${money.format(total)}`;
      if (!saleCart.length) { els.cartList.innerHTML = `<div class="empty">No agregaste productos.</div>`; return; }
      els.cartList.innerHTML = saleCart.map((item,idx) => `
        <div class="cart-row">
          <div><strong>${esc(item.product)} · ${esc(item.design)}</strong>
          <span>${item.qty} u. · ${item.kind==="wholesale"?"Mayorista":"Minorista"} · ${money.format(item.total)}</span></div>
          <span>${money.format(item.price)}</span>
          <button class="secondary slim" type="button" data-remove-cart="${idx}">Quitar</button>
        </div>`).join("");
    }

    function clearCart() { saleCart = []; renderCart(); }

    async function registerSale() {
      if (!saleCart.length) addCurrentItemToCart();
      if (!saleCart.length) return;
      const wholesaleUnits = saleCart.filter(i=>i.kind==="wholesale").reduce((s,i)=>s+i.qty,0);
      if (wholesaleUnits>0 && wholesaleUnits<12) return showToast("Mayorista requiere mínimo 12 unidades.");
      for (const ci of saleCart) {
        const prod = inventory.find(i=>i.id===ci.productId);
        if (!prod || ci.qty>Number(prod.stock||0)) return showToast(`Revisá stock de ${ci.product}.`);
      }
      const now = new Date().toISOString();
      const note = els.saleNote.value.trim();
      const promises = [];
      saleCart.forEach(ci => {
        const prod = inventory.find(i=>i.id===ci.productId);
        promises.push(saveInventoryItem({ ...prod, stock: Number(prod.stock) - ci.qty }));
        const saleDoc = { id:`${Date.now()}-${ci.productId}-${Math.random()}`, ...ci, seller:activeUserName(), note, date:now };
        promises.push(saveSale(saleDoc));
      });
      const totalUnits = saleCart.reduce((s,i)=>s+i.qty,0);
      const totalSale  = saleCart.reduce((s,i)=>s+i.total,0);
      addAudit("Venta", `${totalUnits} unidades por ${money.format(totalSale)}`);
      await Promise.all(promises);
      els.saleQty.value = 1; els.saleNote.value = "";
      clearCart(); els.saleDialog.close();
      showToast("✓ Venta registrada.");
    }

    // ─── PRODUCT FORM ───
    function fillProductForm(item) {
      els.formTitle.textContent = item ? "Editar producto" : "Agregar producto";
      els.editId.value         = item ? item.id : "";
      els.productCode.value    = item ? item.id : nextCode();
      els.productName.value    = item ? item.product : "";
      els.productCategory.value= item ? item.category : "";
      els.productDesign.value  = item ? item.design : "";
      els.productColor.value   = item ? item.color : "";
      els.productImage.value   = item ? (item.image||"") : "";
      els.productStock.value   = item ? item.stock : 0;
      els.productWholesale.value = item ? item.wholesale : 0;
      els.productRetail.value  = item ? item.retail : 0;
      switchScreen("settings");
      els.productName.focus();
    }

    async function saveProduct() {
      const id = els.productCode.value.trim().toUpperCase();
      const existingId = els.editId.value;
      if (!id||!els.productName.value.trim()||!els.productCategory.value.trim()||!els.productDesign.value.trim())
        return showToast("Completá los campos obligatorios.");
      if (inventory.some(i=>i.id===id&&i.id!==existingId)) return showToast("Ese código ya existe.");
      const before = inventory.find(i=>i.id===existingId);
      const item = {
        id, product:els.productName.value.trim(),
        category:els.productCategory.value.trim().toUpperCase(),
        design:els.productDesign.value.trim(), color:els.productColor.value.trim(),
        image:els.productImage.value.trim(),
        stock:Number(els.productStock.value||0),
        wholesale:Number(els.productWholesale.value||0),
        retail:Number(els.productRetail.value||0)
      };
      addAudit(before?"Edición":"Producto nuevo", `${item.id} · ${item.product} · stock ${before?.stock??"-"} → ${item.stock}`);
      await saveInventoryItem(item);
      clearProductForm();
      showToast("✓ Producto guardado.");
    }

    function clearProductForm() {
      [els.productCode,els.productName,els.productCategory,els.productDesign,els.productColor,els.productImage].forEach(i=>i.value="");
      els.productStock.value=0; els.productWholesale.value=0; els.productRetail.value=0;
      els.editId.value=""; els.formTitle.textContent="Agregar producto";
      els.productCode.value = nextCode();
    }
    function nextCode() { return `PR${String(inventory.length+1).padStart(3,"0")}`; }

    // ─── BACKUP ───
    function exportBackup() {
      const blob = new Blob([JSON.stringify({exportedAt:new Date().toISOString(),inventory,sales,audit},null,2)],{type:"application/json"});
      const a = document.createElement("a");
      a.href=URL.createObjectURL(blob); a.download=`stock-3d-respaldo-${new Date().toISOString().slice(0,10)}.json`; a.click();
      URL.revokeObjectURL(a.href);
    }

    async function importBackup(file) {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const p = JSON.parse(reader.result);
          if (!Array.isArray(p.inventory)||!Array.isArray(p.sales)) throw new Error();
          await saveManyInventoryItems(p.inventory.map(i=>({image:"",...i})));
          for (const s of p.sales) await saveSale(s);
          addAudit("Importación","Respaldo importado");
          showToast("✓ Respaldo importado.");
        } catch { showToast("Formato incorrecto."); }
      };
      reader.readAsText(file);
    }

    // ─── EVENTOS ───
    els.searchInput.addEventListener("input", renderProducts);
    els.configSearch.addEventListener("input", renderConfigList);
    els.categoryFilter.addEventListener("change", renderProducts);
    els.availableOnly.addEventListener("change", renderProducts);
    els.saleProduct.addEventListener("change", updateSalePrice);
    el("registerSaleBtn").addEventListener("click", registerSale);
    el("closeSaleDialog").addEventListener("click", ()=>{ clearCart(); els.saleDialog.close(); });
    el("addToCartBtn").addEventListener("click", addCurrentItemToCart);
    els.cartList.addEventListener("click", e => {
      const ri = e.target.dataset.removeCart;
      if (ri!==undefined) { saleCart.splice(Number(ri),1); renderCart(); }
    });
    el("saveProductBtn").addEventListener("click", saveProduct);
    el("clearProductBtn").addEventListener("click", clearProductForm);
    el("exportBtn").addEventListener("click", exportBackup);
    el("importBtn").addEventListener("click", ()=>el("importFile").click());
    el("importFile").addEventListener("change", e=>{ const f=e.target.files[0]; if(f) importBackup(f); e.target.value=""; });

    document.querySelectorAll("[data-price-kind]").forEach(b => {
      b.addEventListener("click", ()=>{
        selectedPriceKind = b.dataset.priceKind;
        document.querySelectorAll("[data-price-kind]").forEach(btn=>btn.classList.toggle("active",btn===b));
        updateSalePrice();
      });
    });

    els.productList.addEventListener("click", e => {
      const card = e.target.closest(".product-card");
      if (!card||!e.target.matches("[data-sell]")) return;
      const item = inventory.find(i=>i.id===card.dataset.id);
      if (!item||Number(item.stock)<=0) return showToast("Sin stock.");
      els.saleProduct.value = item.id;
      selectedPriceKind = "retail";
      document.querySelectorAll("[data-price-kind]").forEach(b=>b.classList.toggle("active",b.dataset.priceKind==="retail"));
      clearCart(); updateSalePrice();
      els.saleDialog.showModal(); els.saleQty.focus();
    });

    els.configList.addEventListener("click", e => {
      const row = e.target.closest(".config-row");
      if (!row||!e.target.matches("[data-edit]")) return;
      const item = inventory.find(i=>i.id===row.dataset.id);
      if (item) fillProductForm(item);
    });

    // ─── INIT ───
    clearProductForm();
    showSession();
  </script>
</body>
</html>
